<!doctype html>
<html lang="fr">
<head>
    <noscript>
    <meta http-equiv="refresh" content="0; url=/noscript.html">
</noscript>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Explorez toutes les dimensions des cris et ronronnements félins.">
    <title>Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Votre CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
</head>

<body class="container-fluid">
    <!-- Contenu principal -->
    <main class="container my-4">
        <article>
            <div class="text-center my-4">
                <img src="/assets/images/illustration-accueil.jpg" alt="Illustration de chats" class="img-fluid rounded" style="max-height: 300px;">
            </div>
            <section class="my-5">
                <h2>Bienvenue sur Cris et Ronronnements</h2>
                <p class="lead">
                    Ce site explore toutes les dimensions des cris et ronronnements félins.
                </p>
            </section>
        </article>
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

         <!-- Charger Bootstrap JS AVANT l'en-tête -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        // Détermine la racine du site
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
                document.getElementById('header-placeholder').innerHTML = `
                    <header class="bg-light py-3 mb-4 border-bottom">
                        <div class="container text-center">
                            <h1>Cris et Ronronnements</h1>
                            <nav class="nav justify-content-center">
                                <a class="nav-link" href="/index.html">Accueil</a>
                                <a class="nav-link" href="/information/index.html">Information</a>
                                <a class="nav-link" href="/formation/index.html">Formation</a>
                                <a class="nav-link" href="/questionnaire/index.html">Questionnaire</a>
                            </nav>
                        </div>
                    </header>
                `;
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
                document.getElementById('footer-placeholder').innerHTML = `
                    <footer class="bg-light py-3 border-top fixed-bottom">
                        <div class="container text-center">
                            <p class="mb-0">&copy; 2026 Cris et Ronronnements</p>
                        </div>
                    </footer>
                `;
            });
    </script>
</body>
</html>
