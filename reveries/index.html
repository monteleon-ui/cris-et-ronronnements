
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Rêveries - Poèmes de Valkirit">
    <title>Rêveries - Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Votre CSS personnalisé -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
</head>

<body class="container-fluid">
    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-4">
                    <h1><i class="bi bi-stars me-2"></i> Rêveries</h1>
                    <p class="lead">Une collection de poèmes par Valkirit.</p>
                </div>

                <!-- Carte pour chaque auteur -->
                <div class="row g-4">
                    
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-person-fill text-primary" style="font-size: 3rem;"></i>
                        <h3 class="card-title mt-3">Valkirit</h3>
                        <p class="card-text">Poétesse des émotions et de la nature.</p>
                        <a href="valkirit/index.html" class="btn btn-primary">
                            <i class="bi bi-book me-2"></i> Explorer ses œuvres
                        </a>
                    </div>
                </div>
            </div>
        
                </div>
            </div>
        </div>
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger Bootstrap JS
        const bootstrapScript = document.createElement('script');
        bootstrapScript.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js';
        document.head.appendChild(bootstrapScript);

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
            });
    </script>
</body>
</html>
