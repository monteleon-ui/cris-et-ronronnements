<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Vérification CAPTCHA pour accéder au questionnaire Cris et Ronronnements.">
    <title>Vérification - Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Votre CSS personnalisé -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap JS (chargé ici pour les composants dynamiques) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="container-fluid">
    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="h4 mb-0">Accès au questionnaire</h2>
                    </div>
                    <div class="card-body text-center">
                        <i class="bi bi-shield-check text-primary" style="font-size: 4rem;"></i>
                        <h3 class="mt-3">Vérification requise</h3>
                        <p class="lead my-3">
                            Pour accéder au questionnaire, merci de répondre à cette question simple :
                        </p>

                        <!-- Question CAPTCHA -->
                        <p class="fw-bold mb-3" id="captcha-question"></p>

                        <!-- Champ de réponse -->
                        <div class="input-group mb-3 justify-content-center" style="max-width: 300px; margin: 0 auto;">
                            <input type="text" id="captcha-input" class="form-control text-center" placeholder="Votre réponse">
                            <button class="btn btn-primary" type="button" onclick="verifyCaptcha()">
                                <i class="bi bi-check-lg"></i> Valider
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
            });
    </script>

    <!-- Script pour le CAPTCHA -->
    <script>
        // Liste de questions/réponses pour le CAPTCHA
        const captchaQuestions = [
            { question: "Combien font 3 + 5 ?", answer: "8" },
            { question: "Combien font 7 - 2 ?", answer: "5" },
            { question: "Quel est le résultat de 4 × 2 ?", answer: "8" },
            { question: "Combien font 10 ÷ 2 ?", answer: "5" },
            { question: "Quel est le résultat de 6 + 3 ?", answer: "9" }
        ];

        // Choisir une question aléatoire au chargement de la page
        window.onload = function() {
            const randomIndex = Math.floor(Math.random() * captchaQuestions.length);
            const currentQuestion = captchaQuestions[randomIndex];
            document.getElementById("captcha-question").textContent = currentQuestion.question;
            window.currentAnswer = currentQuestion.answer;
            document.getElementById("captcha-input").value = "";
        };

        // Vérifier la réponse du CAPTCHA
        function verifyCaptcha() {
            const userAnswer = document.getElementById("captcha-input").value.trim();
            if (userAnswer === window.currentAnswer) {
                // Réponse correcte : marquer la session comme vérifiée
                sessionStorage.setItem('captchaVerified', 'true');

                // Rediriger vers la première question non répondue
                fetch('/assets/data/questions.json')
                    .then(response => response.json())
                    .then(data => {
                        const allQuestions = data.questions;
                        const responses = JSON.parse(localStorage.getItem('questionnaireResponses')) || {};

                        // Trouver la première question non répondue
                        for (let i = 0; i < allQuestions.length; i++) {
                            if (!responses[allQuestions[i].id]) {
                                window.location.href = `/questionnaire/question.html?question=${allQuestions[i].id}`;
                                return;
                            }
                        }

                        // Si toutes les questions ont été répondues, rediriger vers la page de fin
                        window.location.href = "/questionnaire/fin.html";
                    })
                    .catch(error => {
                        console.error("Erreur lors du chargement des questions :", error);
                        // Fallback : rediriger vers la première question
                        window.location.href = "/questionnaire/question.html?question=q1";
                    });
            } else {
                // Réponse incorrecte : afficher un message d'erreur et une nouvelle question
                alert("Réponse incorrecte. Veuillez réessayer.");
                const newIndex = Math.floor(Math.random() * captchaQuestions.length);
                const newQuestion = captchaQuestions[newIndex];
                document.getElementById("captcha-question").textContent = newQuestion.question;
                window.currentAnswer = newQuestion.answer;
                document.getElementById("captcha-input").value = "";
            }
        }
    </script>
</body>
</html>
