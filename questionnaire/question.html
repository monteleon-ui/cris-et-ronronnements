<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Questionnaire sur les cris et ronronnements félins - Cris et Ronronnements.">
    <title>Questionnaire - Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Votre CSS personnalisé -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap JS (chargé ici pour les composants dynamiques) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="container-fluid">
    <!-- Vérifier si l'utilisateur a passé le CAPTCHA -->
    <script>
        if (!sessionStorage.getItem('captchaVerified')) {
            window.location.href = "/questionnaire/verification.html";
        }
    </script>

    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal -->
    <main class="container my-4" id="question-container">
        <!-- Le contenu de la question sera chargé dynamiquement ici -->
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
            });
    </script>

    <!-- Script pour gérer les questions du questionnaire -->
    <script>
        // Variables globales
        let allQuestions = [];

        // Charger les questions depuis le fichier JSON
        async function loadQuestions() {
            try {
                const response = await fetch('/assets/data/questions.json');
                if (!response.ok) {
                    throw new Error(`Erreur HTTP : ${response.status}`);
                }
                const data = await response.json();
                allQuestions = data.questions;
                loadCurrentQuestion();
            } catch (error) {
                console.error("Erreur lors du chargement des questions :", error);
                alert("Impossible de charger les questions. Veuillez réessayer plus tard.");
                window.location.href = "/questionnaire/index.html";
            }
        }

        // Charger la question actuelle
        function loadCurrentQuestion() {
            const questionId = getCurrentQuestionId();
            const question = allQuestions.find(q => q.id === questionId);

            if (!question) {
                redirectToFirstUnansweredQuestion();
                return;
            }

            const container = document.getElementById('question-container');
            let questionHTML = `
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow-sm my-4">
                            <div class="card-header bg-primary text-white">
                                <h2 class="h4 mb-0">
                                    Question ${allQuestions.indexOf(question) + 1} / ${allQuestions.length} : ${question.title}
                                </h2>
                            </div>
                            <div class="card-body">
                                <img src="/assets/images/${question.image}" alt="Illustration pour ${question.title}" class="img-fluid mb-3 rounded" style="max-width: 400px;">
                                <p class="card-text">${question.description}</p>
                                <form id="questionForm">
            `;

            // Ajouter le champ de réponse en fonction du type de question
            if (question.type === "texte_libre") {
                questionHTML += `
                    <div class="mb-3">
                        <label for="response" class="form-label">Votre réponse :</label>
                        <textarea class="form-control" id="response" name="response" rows="4" ${question.required ? 'required' : ''}></textarea>
                    </div>
                `;
            } else if (question.type === "choix_unique") {
                questionHTML += `
                    <fieldset class="mb-3">
                        <legend class="fw-bold">Choisissez une seule réponse :</legend>
                        <div class="form-check">
                `;
                question.options.forEach((option, index) => {
                    questionHTML += `
                        <input class="form-check-input" type="radio" id="option${index}" name="response" value="${option}" ${question.required ? 'required' : ''}>
                        <label class="form-check-label" for="option${index}">${option}</label><br>
                    `;
                });
                questionHTML += `
                        </div>
                    </fieldset>
                `;
            } else if (question.type === "choix_multiples") {
                questionHTML += `
                    <fieldset class="mb-3">
                        <legend class="fw-bold">Cochez toutes les réponses qui s'appliquent :</legend>
                        <div class="form-check">
                `;
                question.options.forEach((option, index) => {
                    questionHTML += `
                        <input class="form-check-input" type="checkbox" id="option${index}" name="response" value="${option}">
                        <label class="form-check-label" for="option${index}">${option}</label><br>
                    `;
                });
                questionHTML += `
                        </div>
                    </fieldset>
                `;
            }

            // Ajouter les boutons
            questionHTML += `
                                <div class="d-flex gap-2 justify-content-center">
                                    <button type="button" class="btn btn-primary" onclick="saveAndContinue('${question.id}')">
                                        <i class="bi bi-arrow-right me-2"></i> Continuer
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="confirmSaveAndQuit('${question.id}')">
                                        <i class="bi bi-save me-2"></i> Continuer plus tard
                                    </button>
                                    <a href="/information/${question.theme}.html" class="btn btn-outline-info">
                                        <i class="bi bi-info-circle me-2"></i> Voir les informations liées
                                    </a>
                                </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = questionHTML;

            // Charger la réponse sauvegardée si elle existe
            loadResponse(question.id, question.type);
        }

        // Sauvegarder une réponse et continuer
        function saveAndContinue(questionId) {
            const question = allQuestions.find(q => q.id === questionId);
            let response;

            if (question.type === "texte_libre") {
                response = document.getElementById('response').value;
            } else if (question.type === "choix_unique") {
                const selectedOption = document.querySelector('input[name="response"]:checked');
                response = selectedOption ? selectedOption.value : null;
            } else if (question.type === "choix_multiples") {
                const selectedOptions = Array.from(document.querySelectorAll('input[name="response"]:checked')).map(el => el.value);
                response = selectedOptions;
            }

            // Vérifier si la réponse est requise
            if (question.required && !response) {
                alert("Cette question est obligatoire. Veuillez répondre.");
                return;
            }

            // Sauvegarder la réponse
            let responses = JSON.parse(localStorage.getItem('questionnaireResponses')) || {};
            responses[questionId] = response;
            localStorage.setItem('questionnaireResponses', JSON.stringify(responses));
            localStorage.setItem('lastQuestionAnswered', questionId);

            // Passer à la question suivante
            const nextQuestionId = getNextQuestion(questionId);
            window.location.href = `/questionnaire/question.html?question=${nextQuestionId}`;
        }

        // Sauvegarder et quitter (avec confirmation)
        function confirmSaveAndQuit(questionId) {
            const question = allQuestions.find(q => q.id === questionId);
            let response;

            if (question.type === "texte_libre") {
                response = document.getElementById('response').value;
            } else if (question.type === "choix_unique") {
                const selectedOption = document.querySelector('input[name="response"]:checked');
                response = selectedOption ? selectedOption.value : null;
            } else if (question.type === "choix_multiples") {
                const selectedOptions = Array.from(document.querySelectorAll('input[name="response"]:checked')).map(el => el.value);
                response = selectedOptions;
            }

            // Vérifier si la réponse est requise
            if (question.required && !response) {
                alert("Cette question est obligatoire. Veuillez répondre avant de continuer plus tard.");
                return;
            }

            // Sauvegarder la réponse
            let responses = JSON.parse(localStorage.getItem('questionnaireResponses')) || {};
            responses[questionId] = response;
            localStorage.setItem('questionnaireResponses', JSON.stringify(responses));
            localStorage.setItem('lastQuestionAnswered', questionId);

            // Afficher un pop-up de confirmation
            if (confirm("Vos réponses ont été sauvegardées localement. Vous pouvez reprendre plus tard. Souhaitez-vous retourner à la page d'accueil ?")) {
                window.location.href = "/index.html";
            }
        }

        // Obtenir l'ID de la question actuelle depuis l'URL
        function getCurrentQuestionId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('question') || allQuestions[0].id;
        }

        // Obtenir la prochaine question
        function getNextQuestion(currentQuestionId) {
            const currentIndex = allQuestions.findIndex(q => q.id === currentQuestionId);
            if (currentIndex < allQuestions.length - 1) {
                return allQuestions[currentIndex + 1].id;
            } else {
                return "fin"; // Page de fin
            }
        }

        // Charger une réponse sauvegardée
        function loadResponse(questionId, questionType) {
            let responses = JSON.parse(localStorage.getItem('questionnaireResponses')) || {};
            if (!responses[questionId]) return;

            const savedResponse = responses[questionId];

            if (questionType === "texte_libre") {
                document.getElementById('response').value = savedResponse;
            } else if (questionType === "choix_unique") {
                const option = document.querySelector(`input[name="response"][value="${savedResponse}"]`);
                if (option) option.checked = true;
            } else if (questionType === "choix_multiples") {
                savedResponse.forEach(value => {
                    const option = document.querySelector(`input[name="response"][value="${value}"]`);
                    if (option) option.checked = true;
                });
            }
        }

        // Rediriger vers la première question non répondue
        function redirectToFirstUnansweredQuestion() {
            const responses = JSON.parse(localStorage.getItem('questionnaireResponses')) || {};
            for (let i = 0; i < allQuestions.length; i++) {
                if (!responses[allQuestions[i].id]) {
                    window.location.href = `/questionnaire/question.html?question=${allQuestions[i].id}`;
                    return;
                }
            }
            // Si toutes les questions ont été répondues
            window.location.href = "/questionnaire/fin.html";
        }

        // Initialiser le questionnaire
        window.onload = function() {
            loadQuestions();
        };
    </script>
</body>
</html>
