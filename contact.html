<!doctype html>
<html lang="fr">
<head>
   <noscript>
    <meta http-equiv="refresh" content="0; url=/noscript.html">
</noscript>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contactez Simon Vitsonnet pour toute question concernant le site Cris et Ronronnements.">
    <title>Contact - Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Votre CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
</head>

<body class="container-fluid">
    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal de la page -->
    <main class="container my-4">
        <!-- Votre contenu ici -->
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        // Détermine la racine du site
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
                // Fallback : afficher un en-tête minimal
                document.getElementById('header-placeholder').innerHTML = `
                    <header class="bg-light py-3 mb-4 border-bottom">
                        <div class="container text-center">
                            <h1>Cris et Ronronnements</h1>
                            <nav class="nav justify-content-center">
                                <a class="nav-link" href="/index.html">Accueil</a>
                                <a class="nav-link" href="/information/index.html">Information</a>
                                <a class="nav-link" href="/formation/index.html">Formation</a>
                                <a class="nav-link" href="/questionnaire/index.html">Questionnaire</a>
                            </nav>
                        </div>
                    </header>
                `;
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
                document.getElementById('footer-placeholder').innerHTML = `
                    <footer class="bg-light py-3 border-top fixed-bottom">
                        <div class="container text-center">
                            <p class="mb-0">&copy; 2026 Cris et Ronronnements</p>
                        </div>
                    </footer>
                `;
            });
    </script>

    <!-- Bootstrap JS (si nécessaire) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Contenu principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h2 class="h4 mb-0">Contact</h2>
                    </div>
                    <div class="card-body">
                        <i class="bi bi-envelope-open-fill text-primary" style="font-size: 4rem;"></i>
                        <h3 class="mt-3">Vous avez une question ?</h3>
                        <p class="lead my-4">
                            Pour toute question concernant le site <strong>Cris et Ronronnements</strong>,
                            vous pouvez contacter directement Simon Vitsonnet.
                        </p>
                        <p>
                            Il répondra à vos demandes via sa page de contact dédiée.
                        </p>
                        <div class="d-grid gap-2 mt-4">
                            <a href="https://simonvitsonnet.com/contact/" class="btn btn-primary btn-lg" target="_blank" rel="noopener noreferrer">
                                <i class="bi bi-box-arrow-up-right me-2"></i> Contacter Simon Vitsonnet
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
