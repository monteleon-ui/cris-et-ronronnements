<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Fin du questionnaire - Cris et Ronronnements. Merci d'avoir participé !">
    <title>Fin du questionnaire - Cris et Ronronnements</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Votre CSS personnalisé -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="container-fluid">
    <!-- Inclusion de l'en-tête -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="h4 mb-0">Félicitations !</h2>
                    </div>
                    <div class="card-body text-center">
                        <i class="bi bi-check2-circle text-success" style="font-size: 5rem;"></i>
                        <h3 class="mt-3">Vous avez terminé le questionnaire !</h3>
                        <p class="lead my-3">
                            Merci d'avoir pris le temps de répondre à toutes les questions.
                        </p>
                        <p>
                            Vos réponses ont été <strong>sauvegardées localement</strong> dans votre navigateur.
                        </p>

                        <div class="d-grid gap-2 mt-4">
                            <a href="/index.html" class="btn btn-primary btn-lg">
                                <i class="bi bi-house me-2"></i> Retour à l'accueil
                            </a>
                            <button type="button" class="btn btn-warning btn-lg" onclick="restartQuestionnaire()">
                                <i class="bi bi-arrow-clockwise me-2"></i> Recommencer le questionnaire
                            </button>
                            <button type="button" class="btn btn-outline-info btn-lg" onclick="showResponses()">
                                <i class="bi bi-eye me-2"></i> Voir mes réponses
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Inclusion du pied de page -->
    <div id="footer-placeholder"></div>

    <!-- Script pour charger l'en-tête et le pied de page -->
    <script>
        const SITE_ROOT = window.location.pathname.split('/')[1] === 'cris-et-ronronnements' ? '/cris-et-ronronnements/' : '/';

        // Charger l'en-tête
        fetch(SITE_ROOT + 'header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement de l\'en-tête :', error);
            });

        // Charger le pied de page
        fetch(SITE_ROOT + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Erreur lors du chargement du pied de page :', error);
            });

        // Fonction pour réinitialiser et recommencer le questionnaire
        function restartQuestionnaire() {
            if (confirm("Êtes-vous sûr de vouloir recommencer le questionnaire ? Toutes vos réponses actuelles seront effacées.")) {
                // Supprimer les réponses sauvegardées
                localStorage.removeItem('questionnaireResponses');
                localStorage.removeItem('lastQuestionAnswered');

                // Conserver la validation du CAPTCHA
                const captchaVerified = sessionStorage.getItem('captchaVerified');

                // Rediriger vers la première question
                if (captchaVerified) {
                    // Si le CAPTCHA est déjà validé, aller directement à la première question
                    window.location.href = "/questionnaire/question.html?question=q1";
                } else {
                    // Sinon, rediriger vers la vérification CAPTCHA
                    window.location.href = "/questionnaire/verification.html";
                }
            }
        }

        // Fonction pour afficher les réponses (à développer plus tard)
        function showResponses() {
            alert("Cette fonctionnalité sera disponible prochainement. Vos réponses sont sauvegardées localement dans votre navigateur.");
        }
    </script>
</body>
</html>
